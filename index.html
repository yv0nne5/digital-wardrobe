<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Yvonne's Wardrobe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&family=Silkscreen:wght@400;700&family=Sniglet:wght@400;800&display=swap" rel="stylesheet">
<style>
  :root{
    --hot:#ff45a0;       /* hot pink */
    --bubble:#ffb3da;    /* bubble pink */
    --lilac:#c9a9ff;     /* lilac */
    --grape:#8a4fff;     /* grape */
    --gtext:#5a2ea6;     /* darker grape for small text (contrast) */
    --lime:#c6ff4f;      /* lime accent */
    --butter:#ffe14f;    /* butter yellow */
    --cream:#fff4fb;     /* near-white */
    --ink:#3a1148;       /* deep plum text */
    --chrome1:#ffffff;
    --chrome2:#d9c6ff;
    --chrome3:#9f86d8;
    --pixel:'Silkscreen', monospace;
    --logo:'Rubik Mono One', sans-serif;
    --body:'Sniglet', cursive;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:var(--body);
    color:var(--ink);
    background:
      radial-gradient(circle at 20% 10%, #ffd9f0 0, transparent 40%),
      radial-gradient(circle at 80% 90%, #d6c2ff 0, transparent 45%),
      linear-gradient(160deg,#ffc2e6 0%, #d9c6ff 55%, #c6ff4f 140%);
    background-attachment:fixed;
    display:flex; justify-content:center;
    overflow:hidden;
  }
  /* leopard accent pattern as data-uri */
  .leopard{
    background-color:#f2c98a;
    background-image:
      radial-gradient(circle at 6px 6px, #5a2d12 2.2px, transparent 2.6px),
      radial-gradient(circle at 6px 6px, transparent 3.4px, #b5701f 3.4px, transparent 4.4px),
      radial-gradient(circle at 22px 18px, #5a2d12 2.2px, transparent 2.6px),
      radial-gradient(circle at 22px 18px, transparent 3.4px, #b5701f 3.4px, transparent 4.4px);
    background-size:28px 28px;
  }
  .leopard.dark{background-color:#6e3f1c;}

  #device{
    width:100%; max-width:430px; height:100dvh;
    display:flex; flex-direction:column;
    background:linear-gradient(150deg,var(--chrome1),var(--chrome2) 40%,var(--chrome3));
    position:relative;
    border-left:3px solid rgba(255,255,255,.6);
    border-right:3px solid rgba(122,86,180,.5);
    box-shadow:0 0 60px rgba(138,79,255,.4);
  }
  /* CRT scanline + glow overlay */
  #device::after{
    content:""; position:absolute; inset:0; pointer-events:none; z-index:50;
    background:repeating-linear-gradient(0deg, rgba(255,255,255,.05) 0 1px, transparent 1px 3px);
    mix-blend-mode:overlay;
  }

  /* ===== HEADER ===== */
  header{
    position:relative; z-index:5;
    padding:10px 14px 8px;
    border-bottom:3px solid var(--grape);
    display:flex; align-items:center; gap:10px;
  }
  header .strip{position:absolute; inset:0; opacity:.92; z-index:-1;}
  .logo{
    font-family:var(--logo);
    font-size:18px; line-height:1; color:#fff;
    text-shadow:2px 2px 0 var(--hot), 4px 4px 0 var(--grape);
    letter-spacing:.5px; flex:1;
  }
  .logo small{display:block; font-family:var(--pixel); font-size:8px; letter-spacing:2px; color:#fff; text-shadow:1px 1px 0 var(--grape); margin-top:4px;}
  .spark{font-size:23px; filter:drop-shadow(1px 1px 0 #fff);}

  /* ===== SCREEN AREA ===== */
  main{flex:1; overflow-y:auto; overflow-x:hidden; position:relative; z-index:2;}
  .view{display:none; padding:12px; min-height:100%;}
  .view.active{display:block; animation:pop .25s ease;}
  @keyframes pop{from{opacity:0; transform:scale(.97)} to{opacity:1; transform:scale(1)}}

  /* ===== DECK (swipe) ===== */
  .deck{
    background:var(--cream);
    border:3px solid var(--grape);
    border-radius:14px;
    box-shadow:inset 0 0 0 3px #fff, 0 5px 0 rgba(122,86,180,.35);
    padding:6px; margin-bottom:6px; position:relative; overflow:hidden;
  }
  .deck-label{
    font-family:var(--pixel); font-size:12px; letter-spacing:2px;
    color:var(--gtext); position:absolute; top:7px; left:12px; z-index:3;
  }
  .stage{
    height:132px; display:flex; align-items:center; justify-content:center;
    position:relative; touch-action:pan-y;
  }
  .stage.tall{height:300px;}
  .stage .empty{font-family:var(--pixel); font-size:13px; color:var(--gtext); text-align:center; line-height:2;}
  .garment{
    height:124px; width:auto; max-width:82%;
    transition:transform .25s ease, opacity .25s ease;
    filter:drop-shadow(3px 4px 4px rgba(122,86,180,.4));
    user-select:none; -webkit-user-drag:none;
  }
  .stage.tall .garment{height:280px;}
  /* bottoms are longer than tops -> ~15% taller block */
  #botStage{height:152px;}
  #botStage .garment{height:143px;}
  .garment.swap{opacity:0; transform:scale(.85);}
  .item-name{
    text-align:center; font-family:var(--pixel); font-size:12px;
    color:var(--ink); margin-top:1px; min-height:11px;
  }
  /* arrow row */
  .arrows{display:flex; gap:6px; justify-content:center; margin-top:3px;}
  .navbtn{
    font-family:var(--pixel); font-size:15px;
    background:linear-gradient(180deg,#fff,var(--lilac));
    border:2px solid var(--grape); border-radius:7px;
    padding:7px 18px; color:var(--ink); cursor:pointer;
    box-shadow:0 2px 0 var(--grape); transition:transform .05s;
  }
  .navbtn:active{transform:translateY(2px); box-shadow:0 0 0 var(--grape);}
  .counter{font-family:var(--pixel); font-size:11px; color:var(--gtext); align-self:center; min-width:34px; text-align:center;}

  /* separates / dress toggle */
  .modetoggle{display:flex; gap:6px; margin-bottom:8px;}
  .modetoggle button{
    flex:1; font-family:var(--pixel); font-size:12px; letter-spacing:1px;
    padding:9px 4px; border-radius:9px; cursor:pointer;
    border:2px solid var(--grape); background:#fff; color:var(--gtext);
    box-shadow:0 3px 0 var(--grape); transition:transform .05s;
  }
  .modetoggle button:active{transform:translateY(3px); box-shadow:0 0 0 var(--grape);}
  .modetoggle button.sel{background:var(--grape); color:#fff;}

  /* action buttons */
  .actions{display:flex; gap:8px; margin-top:4px;}
  .bigbtn{
    flex:1; font-family:var(--logo); font-size:14px; letter-spacing:.5px;
    padding:14px 6px; border-radius:12px; cursor:pointer; color:#fff;
    border:2px solid #fff; box-shadow:0 5px 0 rgba(0,0,0,.18);
    transition:transform .05s;
  }
  .bigbtn:active{transform:translateY(4px); box-shadow:0 1px 0 rgba(0,0,0,.18);}
  .bigbtn.dress{background:linear-gradient(180deg,var(--hot),#d61f7a);}
  .bigbtn.plan{background:linear-gradient(180deg,var(--grape),#5c2db8);}

  /* ===== MY STUFF GRID ===== */
  .panel-title{font-family:var(--logo); font-size:17px; color:var(--grape); text-shadow:1px 1px 0 #fff; margin:4px 0 12px;}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .card{
    background:var(--cream); border:3px solid var(--lilac); border-radius:12px;
    padding:6px; position:relative; box-shadow:0 4px 0 rgba(122,86,180,.25);
  }
  .card img{width:100%; height:90px; object-fit:contain;}
  .card .nm{font-family:var(--pixel); font-size:11px; text-align:center; margin-top:4px; word-break:break-word;}
  .card .tag{position:absolute; top:4px; left:4px; font-family:var(--pixel); font-size:10px; padding:2px 5px; border-radius:6px; color:#fff;}
  .tag.top{background:var(--hot);}
  .tag.bottom{background:var(--grape);}
  .tag.dress{background:var(--lime); color:var(--ink);}
  .card .del{position:absolute; top:2px; right:4px; cursor:pointer; font-size:17px; color:var(--hot); background:#fff; border-radius:50%; width:20px; height:20px; line-height:18px; text-align:center; border:1px solid var(--hot);}

  /* add form */
  .addbox{
    background:var(--cream); border:3px dashed var(--hot); border-radius:14px;
    padding:14px; margin-bottom:14px;
  }
  .addbox label{font-family:var(--pixel); font-size:12px; color:var(--gtext); display:block; margin:8px 0 4px;}
  .addbox input[type=text]{
    width:100%; font-family:var(--body); font-size:18px; padding:8px;
    border:2px solid var(--lilac); border-radius:8px; background:#fff;
  }
  .catpick{display:flex; gap:8px; margin-top:4px;}
  .catpick button{
    flex:1; font-family:var(--pixel); font-size:12px; padding:10px; border-radius:8px; cursor:pointer;
    border:2px solid var(--grape); background:#fff; color:var(--gtext);
  }
  .catpick button.sel{background:var(--grape); color:#fff;}
  .photobtn{
    display:block; text-align:center; font-family:var(--pixel); font-size:13px;
    padding:24px 10px; border:2px solid var(--lilac); border-radius:10px;
    background:linear-gradient(180deg,#fff,#f3ecff); color:var(--gtext); cursor:pointer; margin-top:4px;
  }
  .photobtn.has{padding:6px; border-style:solid;}
  .photobtn img{max-height:100px; max-width:100%;}
  .chips{display:flex; flex-wrap:wrap; gap:6px; margin-top:4px;}
  .chips button{
    font-family:var(--pixel); font-size:11px; padding:7px 11px; border-radius:14px;
    border:2px solid var(--lilac); background:#fff; color:var(--gtext); cursor:pointer;
  }
  .chips button.sel{background:var(--hot); color:#fff; border-color:var(--hot);}
  /* filter bar in My Closet */
  .filterbar{background:rgba(255,255,255,.55); border:2px dashed var(--lilac); border-radius:12px; padding:10px; margin-bottom:12px;}
  .flabel{font-family:var(--pixel); font-size:11px; color:var(--gtext); margin:6px 0 3px;}
  .flabel:first-child{margin-top:0;}
  .filterbar .chips button.sel{background:var(--grape); color:#fff; border-color:var(--grape);}
  .card .meta{display:flex; flex-wrap:wrap; gap:3px; justify-content:center; margin-top:3px;}
  .card .meta span{font-family:var(--pixel); font-size:10px; background:var(--bubble); color:var(--ink); padding:2px 5px; border-radius:8px;}
  .savebtn{
    width:100%; margin-top:12px; font-family:var(--logo); font-size:15px; color:#fff;
    background:linear-gradient(180deg,var(--lime),#8fce1f); border:2px solid #fff;
    border-radius:10px; padding:12px; cursor:pointer; box-shadow:0 4px 0 rgba(0,0,0,.15);
  }
  .savebtn:active{transform:translateY(3px);}

  /* ===== CALENDAR ===== */
  .calhead{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
  .calhead button{font-family:var(--pixel); font-size:17px; background:#fff; border:2px solid var(--grape); border-radius:8px; padding:4px 12px; cursor:pointer; color:var(--grape); box-shadow:0 3px 0 var(--grape);}
  .calhead .mlabel{font-family:var(--logo); font-size:16px; color:var(--grape);}
  .calgrid{display:grid; grid-template-columns:repeat(7,1fr); gap:4px;}
  .dow{font-family:var(--pixel); font-size:11px; text-align:center; color:var(--gtext); padding:2px 0;}
  .day{
    min-height:58px; border:2px solid var(--lilac); border-radius:8px; background:var(--cream);
    position:relative; cursor:pointer; overflow:hidden; padding:2px;
    display:flex; flex-direction:column; gap:1px;
  }
  .day .num{font-family:var(--pixel); font-size:12px; color:var(--ink); line-height:1;}
  .day.today{border-color:var(--hot); box-shadow:0 0 0 2px var(--bubble) inset;}
  .day .daytype{font-family:var(--pixel); font-size:8px; color:#fff; text-align:center; border-radius:4px; padding:1px 0; line-height:1.4;}
  .day .mini{flex:1; display:flex; flex-direction:column; min-height:0;}
  .day .mini img{flex:1; width:100%; object-fit:contain; min-height:0;}
  .day.blank{border:none; background:transparent; cursor:default; min-height:0;}
  .daylegend{display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:12px;}
  .daylegend span{font-family:var(--pixel); font-size:10px; color:var(--ink); display:flex; align-items:center; gap:4px;}
  .daylegend i{width:11px; height:11px; border-radius:3px; display:inline-block;}
  .pendingbanner{
    background:linear-gradient(180deg,var(--hot),#d61f7a); color:#fff;
    font-family:var(--pixel); font-size:12px; text-align:center; padding:10px;
    border-radius:10px; margin-bottom:10px; line-height:1.6; border:2px solid #fff;
  }
  .pendingbanner .x{margin-left:8px; cursor:pointer; text-decoration:underline;}

  /* ===== TAB BAR ===== */
  nav{
    position:relative; z-index:5; display:flex;
    border-top:3px solid var(--grape);
  }
  nav .strip{position:absolute; inset:0; opacity:.9; z-index:-1;}
  nav button{
    flex:1; background:transparent; border:none; cursor:pointer;
    padding:10px 4px 12px; font-family:var(--pixel); font-size:11px; letter-spacing:1px;
    color:#fff; text-shadow:1px 1px 0 var(--grape);
    display:flex; flex-direction:column; align-items:center; gap:4px;
  }
  nav button .ic{font-size:21px; filter:drop-shadow(1px 1px 0 rgba(0,0,0,.2));}
  nav button.active{background:rgba(255,255,255,.55); color:var(--grape); text-shadow:none;}
  nav button.active .ic{transform:scale(1.15);}

  /* tiny toast */
  #toast{
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:#fff; font-family:var(--pixel); font-size:12px;
    padding:10px 16px; border-radius:20px; opacity:0; transition:.3s; z-index:99; pointer-events:none;
    border:2px solid var(--lime);
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* edit sheet */
  .card{cursor:pointer;}
  .modal{position:fixed; inset:0; z-index:200; background:rgba(58,17,72,.55); display:flex; align-items:center; justify-content:center; padding:16px;}
  .sheet{
    background:var(--cream); border:3px solid var(--grape); border-radius:18px;
    box-shadow:0 10px 0 rgba(122,86,180,.4); width:100%; max-width:400px;
    max-height:88vh; overflow-y:auto; padding:16px;
  }
  .sheet-title{font-family:var(--logo); font-size:17px; color:var(--grape); text-shadow:1px 1px 0 #fff; margin-bottom:10px;}
  .edit-photo{display:block; max-height:140px; max-width:100%; margin:0 auto 6px;}
  .sheet label{font-family:var(--pixel); font-size:12px; color:var(--gtext); display:block; margin:10px 0 5px;}
  .sheet input[type=text]{width:100%; font-family:var(--body); font-size:18px; padding:8px; border:2px solid var(--lilac); border-radius:8px; background:#fff;}
  .edit-actions{display:flex; gap:10px; margin-top:16px;}
  .ebtn{flex:1; font-family:var(--logo); font-size:13px; padding:13px; border-radius:10px; cursor:pointer; border:2px solid #fff; box-shadow:0 4px 0 rgba(0,0,0,.15);}
  .ebtn.save{background:linear-gradient(180deg,var(--lime),#8fce1f); color:#fff;}
  .ebtn.cancel{background:#fff; color:var(--grape); border-color:var(--lilac); box-shadow:0 4px 0 var(--lilac);}
  .ebtn:active{transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.15);}
  #dayOutfit{display:flex; gap:8px; justify-content:center; align-items:center; min-height:96px; background:#fff; border:2px solid var(--lilac); border-radius:10px; padding:8px;}
  #dayOutfit img{max-height:88px; max-width:45%; object-fit:contain;}
  #dayOutfit .none{font-family:var(--pixel); font-size:11px; color:var(--gtext); text-align:center; line-height:1.7;}
  .filtertoggle{width:100%; font-family:var(--pixel); font-size:11px; color:var(--gtext); background:#fff; border:2px dashed var(--lilac); border-radius:10px; padding:9px; margin-bottom:8px; cursor:pointer;}
  .filtertoggle:active{transform:translateY(1px);}
</style>
</head>
<body>
<div id="device">
  <header>
    <div class="strip leopard dark"></div>
    <div class="logo">YVONNE'S<br>WARDROBE<small>★ AS IF DIGITAL CLOSET ★</small></div>
    <div class="spark">💅</div>
  </header>

  <main>
    <!-- ===== CLOSET / SWIPE ===== -->
    <section class="view active" id="view-closet">
      <div class="modetoggle">
        <button data-mode="separates" class="sel">👚 SEPARATES</button>
        <button data-mode="dress">👗 ONE PIECES</button>
      </div>

      <div id="separates">
        <div class="deck">
          <span class="deck-label">▲ TOPS</span>
          <div class="stage" id="topStage"></div>
          <div class="item-name" id="topName"></div>
          <div class="arrows">
            <button class="navbtn" data-deck="top" data-dir="-1">◀</button>
            <span class="counter" id="topCount">0/0</span>
            <button class="navbtn" data-deck="top" data-dir="1">▶</button>
          </div>
        </div>

        <div class="deck">
          <span class="deck-label">▼ BOTTOMS</span>
          <div class="stage" id="botStage"></div>
          <div class="item-name" id="botName"></div>
          <div class="arrows">
            <button class="navbtn" data-deck="bot" data-dir="-1">◀</button>
            <span class="counter" id="botCount">0/0</span>
            <button class="navbtn" data-deck="bot" data-dir="1">▶</button>
          </div>
        </div>
      </div>

      <div id="dressWrap" style="display:none">
        <div class="deck">
          <span class="deck-label">👗 ONE PIECES</span>
          <div class="stage tall" id="dressStage"></div>
          <div class="item-name" id="dressName"></div>
          <div class="arrows">
            <button class="navbtn" data-deck="dress" data-dir="-1">◀</button>
            <span class="counter" id="dressCount">0/0</span>
            <button class="navbtn" data-deck="dress" data-dir="1">▶</button>
          </div>
        </div>
      </div>

      <div class="actions">
        <button class="bigbtn dress" id="dressMe">STYLE ME ✨</button>
        <button class="bigbtn plan" id="planLook">PLAN IT 📅</button>
      </div>
    </section>

    <!-- ===== MY STUFF ===== -->
    <section class="view" id="view-stuff">
      <div class="panel-title">★ ADD A PIECE</div>
      <div class="addbox">
        <input type="file" id="photoInput" accept="image/*" hidden>
        <label class="photobtn" id="photoBtn" for="photoInput">📸 TAP TO ADD PHOTO<br>(camera or gallery)</label>
        <label>NAME IT</label>
        <input type="text" id="itemName" placeholder="e.g. plaid mini skirt" maxlength="28">
        <label>WHAT IS IT?</label>
        <div class="catpick">
          <button data-cat="top">▲ TOP</button>
          <button data-cat="bottom">▼ BOTTOM</button>
          <button data-cat="dress">👗 ONE PIECE</button>
        </div>
        <label>SEASON (tap any)</label>
        <div class="chips" id="seasonChips">
          <button data-v="Spring">SPRING</button>
          <button data-v="Summer">SUMMER</button>
          <button data-v="Fall">FALL</button>
          <button data-v="Winter">WINTER</button>
        </div>
        <label>OCCASION (tap any)</label>
        <div class="chips" id="occasionChips">
          <button data-v="Casual">CASUAL</button>
          <button data-v="Work">WORK</button>
          <button data-v="Going out">GOING OUT</button>
          <button data-v="Formal">FORMAL</button>
          <button data-v="Active">ACTIVE</button>
          <button data-v="Holiday">HOLIDAY</button>
        </div>
        <button class="savebtn" id="saveItem">ADD TO CLOSET</button>
      </div>
      <div class="panel-title">★ MY CLOSET (<span id="itemCount">0</span>)</div>
      <div class="filterbar">
        <div class="flabel">TYPE</div>
        <div class="chips" id="filterCat">
          <button data-v="all" class="sel">ALL</button>
          <button data-v="top">TOPS</button>
          <button data-v="bottom">BOTTOMS</button>
          <button data-v="dress">ONE PIECES</button>
        </div>
        <div class="flabel">SEASON</div>
        <div class="chips" id="filterSeason">
          <button data-v="Spring">SPRING</button>
          <button data-v="Summer">SUMMER</button>
          <button data-v="Fall">FALL</button>
          <button data-v="Winter">WINTER</button>
        </div>
        <div class="flabel">OCCASION</div>
        <div class="chips" id="filterOccasion">
          <button data-v="Casual">CASUAL</button>
          <button data-v="Work">WORK</button>
          <button data-v="Going out">GOING OUT</button>
          <button data-v="Formal">FORMAL</button>
          <button data-v="Active">ACTIVE</button>
          <button data-v="Holiday">HOLIDAY</button>
        </div>
      </div>
      <div class="grid" id="stuffGrid"></div>
    </section>

    <!-- ===== CALENDAR ===== -->
    <section class="view" id="view-cal">
      <div id="pendingZone"></div>
      <div class="calhead">
        <button id="prevMonth">◀</button>
        <span class="mlabel" id="monthLabel"></span>
        <button id="nextMonth">▶</button>
      </div>
      <div class="calgrid" id="dowRow"></div>
      <div class="calgrid" id="calGrid" style="margin-top:4px;"></div>
      <div class="daylegend" id="dayLegend"></div>
    </section>
  </main>

  <nav>
    <div class="strip leopard dark"></div>
    <button class="navtab active" data-view="closet"><span class="ic">👗</span>CLOSET</button>
    <button class="navtab" data-view="stuff"><span class="ic">➕</span>MY STUFF</button>
    <button class="navtab" data-view="cal"><span class="ic">🗓️</span>CALENDAR</button>
  </nav>
</div>
<div id="dayModal" class="modal" style="display:none">
  <div class="sheet">
    <div class="sheet-title" id="dayTitle">★ PLAN DAY</div>
    <label>DAY TYPE (tap to set, tap again to clear)</label>
    <div class="chips" id="dayTypeChips"></div>
    <label>PLANNED OUTFIT</label>
    <div id="dayOutfit"></div>
    <div class="edit-actions">
      <button id="dayClear" class="ebtn cancel">CLEAR DAY</button>
      <button id="dayClose" class="ebtn save">DONE</button>
    </div>
  </div>
</div>
<div id="styleModal" class="modal" style="display:none">
  <div class="sheet">
    <div class="sheet-title" id="styleTitle">★ STYLE THIS DAY</div>
    <div class="modetoggle" id="styleMode">
      <button data-mode="separates" class="sel">👚 SEPARATES</button>
      <button data-mode="dress">👗 ONE PIECES</button>
    </div>
    <button id="styleAllToggle" class="filtertoggle">👀 SHOW ALL MY CLOTHES</button>
    <div id="styleSeparates">
      <div class="deck">
        <span class="deck-label">▲ TOPS</span>
        <div class="stage" id="sTopStage"></div>
        <div class="item-name" id="sTopName"></div>
        <div class="arrows">
          <button class="navbtn" data-deck="stop" data-dir="-1">◀</button>
          <span class="counter" id="sTopCount">0/0</span>
          <button class="navbtn" data-deck="stop" data-dir="1">▶</button>
        </div>
      </div>
      <div class="deck">
        <span class="deck-label">▼ BOTTOMS</span>
        <div class="stage" id="sBotStage"></div>
        <div class="item-name" id="sBotName"></div>
        <div class="arrows">
          <button class="navbtn" data-deck="sbot" data-dir="-1">◀</button>
          <span class="counter" id="sBotCount">0/0</span>
          <button class="navbtn" data-deck="sbot" data-dir="1">▶</button>
        </div>
      </div>
    </div>
    <div id="styleDressWrap" style="display:none">
      <div class="deck">
        <span class="deck-label">👗 ONE PIECES</span>
        <div class="stage tall" id="sDressStage"></div>
        <div class="item-name" id="sDressName"></div>
        <div class="arrows">
          <button class="navbtn" data-deck="sdress" data-dir="-1">◀</button>
          <span class="counter" id="sDressCount">0/0</span>
          <button class="navbtn" data-deck="sdress" data-dir="1">▶</button>
        </div>
      </div>
    </div>
    <button id="styleShuffle" class="savebtn" style="background:linear-gradient(180deg,var(--hot),#d61f7a);">🎲 SHUFFLE</button>
    <div class="edit-actions">
      <button id="styleCancel" class="ebtn cancel">CANCEL</button>
      <button id="styleSave" class="ebtn save">SAVE TO DAY</button>
    </div>
  </div>
</div>
<div id="editModal" class="modal" style="display:none">
  <div class="sheet">
    <div class="sheet-title">★ EDIT PIECE</div>
    <img id="editImg" class="edit-photo" alt="">
    <label>NAME</label>
    <input type="text" id="editName" maxlength="28">
    <label>WHAT IS IT?</label>
    <div class="catpick" id="editCat">
      <button data-cat="top">▲ TOP</button>
      <button data-cat="bottom">▼ BOTTOM</button>
      <button data-cat="dress">👗 ONE PIECE</button>
    </div>
    <label>SEASON (tap any)</label>
    <div class="chips" id="editSeason">
      <button data-v="Spring">SPRING</button>
      <button data-v="Summer">SUMMER</button>
      <button data-v="Fall">FALL</button>
      <button data-v="Winter">WINTER</button>
    </div>
    <label>OCCASION (tap any)</label>
    <div class="chips" id="editOccasion">
      <button data-v="Casual">CASUAL</button>
      <button data-v="Work">WORK</button>
      <button data-v="Going out">GOING OUT</button>
      <button data-v="Formal">FORMAL</button>
      <button data-v="Active">ACTIVE</button>
      <button data-v="Holiday">HOLIDAY</button>
    </div>
    <div class="edit-actions">
      <button id="editCancel" class="ebtn cancel">CANCEL</button>
      <button id="editSave" class="ebtn save">SAVE</button>
    </div>
  </div>
</div>
<div id="toast"></div>

function cacheLocal(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){ mem=state; } }

/* ---- small helpers ---- */
function uuid(){ if(window.crypto&&crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0,v=c==='x'?r:(r&0x3|0x8);return v.toString(16);}); }
function dataURLtoBlob(u){ const [h,b]=u.split(','); const mime=(h.match(/:(.*?);/)||[])[1]||'image/webp'; const bin=atob(b); const a=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i); return new Blob([a],{type:mime}); }
function rowToItem(r){ return {id:r.id, name:r.name, cat:r.category, season:r.season||[], occasion:r.occasion||[], img:r.image_path}; }

/* ---- photo upload -> public URL ---- */
async function uploadPhoto(id, dataURL){
  const {error}=await db.storage.from(BUCKET).upload(id+'.webp', dataURLtoBlob(dataURL), {contentType:'image/webp', upsert:true});
  if(error) throw error;
  return db.storage.from(BUCKET).getPublicUrl(id+'.webp').data.publicUrl;
}

/* ---- cloud writes (no-ops while offline; toast on failure) ---- */
async function cloudInsertItem(it){ if(!online)return; const {error}=await db.from('items').insert({id:it.id,name:it.name,category:it.cat,season:it.season,occasion:it.occasion,image_path:it.img}); if(error){console.error(error);toast('couldn\u2019t save — check connection');} }
async function cloudUpdateItem(it){ if(!online)return; const {error}=await db.from('items').update({name:it.name,category:it.cat,season:it.season,occasion:it.occasion}).eq('id',it.id); if(error){console.error(error);toast('update didn\u2019t sync');} }
async function cloudDeleteItem(id){ if(!online)return; await db.storage.from(BUCKET).remove([id+'.webp']).catch(()=>{}); const {error}=await db.from('items').delete().eq('id',id); if(error){console.error(error);toast('delete didn\u2019t sync');} }
async function cloudDeleteDay(key){ if(!online)return; const {error}=await db.from('day_plans').delete().eq('plan_date',key); if(error){console.error(error);toast('clear didn\u2019t sync');} }
async function cloudSaveDay(key){ if(!online)return;
  const dt=state.dayTypes[key]||null, o=state.outfits[key]||null;
  if(!dt&&!o) return cloudDeleteDay(key);
  const row={plan_date:key,day_type:dt,top_id:(o&&o.topId)||null,bottom_id:(o&&o.botId)||null,dress_id:(o&&o.dressId)||null};
  const {error}=await db.from('day_plans').upsert(row,{onConflict:'plan_date'}); if(error){console.error(error);toast('plan didn\u2019t sync');}
}

let state={items:[], outfits:{}, dayTypes:{}};   // filled by boot()
let mode='separates'; // 'separates' | 'dress'

/* =========================================================
   CLOSET / SWIPE
   ========================================================= */
const tops=()=>state.items.filter(i=>i.cat==='top');
const bots=()=>state.items.filter(i=>i.cat==='bottom');
const dresses=()=>state.items.filter(i=>i.cat==='dress');

const DECKS={
  top:  {list:tops,    stage:'topStage',   name:'topName',   count:'topCount',   idx:0, label:'tops'},
  bot:  {list:bots,    stage:'botStage',   name:'botName',   count:'botCount',   idx:0, label:'bottoms'},
  dress:{list:dresses, stage:'dressStage', name:'dressName', count:'dressCount', idx:0, label:'one-pieces'}
};

function renderDeck(deck){
  const D=DECKS[deck], list=D.list();
  const stage=document.getElementById(D.stage);
  const nameEl=document.getElementById(D.name);
  const count=document.getElementById(D.count);
  if(D.idx>=list.length) D.idx=0;
  if(list.length===0){
    stage.innerHTML='<div class="empty">no '+D.label+' yet!<br>add some in MY STUFF →</div>';
    nameEl.textContent=''; count.textContent='0/0'; return;
  }
  const it=list[D.idx];
  stage.innerHTML='<img class="garment swap" src="'+it.img+'" alt="'+it.name+'">';
  const img=stage.querySelector('img');
  requestAnimationFrame(()=>img.classList.remove('swap'));
  nameEl.textContent=it.name;
  count.textContent=(D.idx+1)+'/'+list.length;
}
function step(deck,dir){
  const D=DECKS[deck], n=D.list().length;
  if(!n) return;
  D.idx=(D.idx+dir+n)%n;
  renderDeck(deck);
}
document.querySelectorAll('.navbtn').forEach(b=>{
  b.onclick=()=>step(b.dataset.deck, +b.dataset.dir);
});

/* swipe gestures per stage */
function addSwipe(stageId, deck){
  const el=document.getElementById(stageId);
  let x0=null;
  const start=x=>x0=x;
  const end=x=>{ if(x0===null) return; const dx=x-x0; if(Math.abs(dx)>40) step(deck, dx<0?1:-1); x0=null; };
  el.addEventListener('touchstart',e=>start(e.touches[0].clientX),{passive:true});
  el.addEventListener('touchend',e=>end(e.changedTouches[0].clientX));
  el.addEventListener('mousedown',e=>start(e.clientX));
  el.addEventListener('mouseup',e=>end(e.clientX));
}
addSwipe('topStage','top');
addSwipe('botStage','bot');
addSwipe('dressStage','dress');

/* separates / dress toggle */
document.querySelectorAll('#view-closet .modetoggle button').forEach(b=>{
  b.onclick=()=>{
    mode=b.dataset.mode;
    document.querySelectorAll('.modetoggle button').forEach(x=>x.classList.toggle('sel', x===b));
    document.getElementById('separates').style.display = mode==='separates'?'block':'none';
    document.getElementById('dressWrap').style.display = mode==='dress'?'block':'none';
    if(mode==='dress') renderDeck('dress');
  };
});

document.getElementById('dressMe').onclick=()=>{
  if(mode==='dress'){
    const d=dresses(); if(!d.length){ toast('no one-pieces yet! add one 👗'); return; }
    DECKS.dress.idx=Math.floor(Math.random()*d.length); renderDeck('dress');
  } else {
    const t=tops(),b=bots();
    if(t.length) DECKS.top.idx=Math.floor(Math.random()*t.length);
    if(b.length) DECKS.bot.idx=Math.floor(Math.random()*b.length);
    renderDeck('top'); renderDeck('bot');
  }
  toast('✨ ugh as if! cute combo ✨');
};

/* =========================================================
   PLAN IT  ->  go to calendar in "drop" mode
   ========================================================= */
let pending=null;
document.getElementById('planLook').onclick=()=>{
  if(mode==='dress'){
    const d=dresses(); if(!d.length){ toast('pick a one-piece first 👗'); return; }
    pending={dressId:d[DECKS.dress.idx].id};
  } else {
    const t=tops(),b=bots();
    if(!t.length||!b.length){ toast('add a top AND a bottom first!'); return; }
    pending={topId:t[DECKS.top.idx].id, botId:b[DECKS.bot.idx].id};
  }
  switchView('cal');
  toast('tap a day to drop this fit 👇');
};

   ========================================================= */
let pendingPhoto=null, pendingCat=null;
const photoInput=document.getElementById('photoInput');
const photoBtn=document.getElementById('photoBtn');

/* remove plain background + downscale, all on-device */
function processPhoto(dataURL, cb){
  const img=new Image();
  img.onload=()=>{
    const MAX=680, sc=Math.min(1, MAX/Math.max(img.width,img.height));
    const w=Math.round(img.width*sc), h=Math.round(img.height*sc);
    const c=document.createElement('canvas'); c.width=w; c.height=h;
    const ctx=c.getContext('2d'); ctx.drawImage(img,0,0,w,h);
    const id=ctx.getImageData(0,0,w,h), d=id.data;
    // estimate background colour from the four corners
    let br=0,bg=0,bb=0; const cs=[[2,2],[w-3,2],[2,h-3],[w-3,h-3]];
    cs.forEach(([x,y])=>{const i=(y*w+x)*4; br+=d[i];bg+=d[i+1];bb+=d[i+2];});
    br/=4; bg/=4; bb/=4;
    const TOL=46;
    const isBg=i=>Math.abs(d[i]-br)<TOL && Math.abs(d[i+1]-bg)<TOL && Math.abs(d[i+2]-bb)<TOL;
    // flood-fill background from the edges only (keeps interior colours safe)
    const seen=new Uint8Array(w*h), st=[];
    const push=(x,y)=>{const p=y*w+x; if(!seen[p]&&isBg(p*4)){seen[p]=1; st.push(p);}};
    for(let x=0;x<w;x++){push(x,0); push(x,h-1);}
    for(let y=0;y<h;y++){push(0,y); push(w-1,y);}
    while(st.length){
      const p=st.pop(), x=p%w, y=(p/w)|0;
      d[p*4+3]=0;
      if(x>0)push(x-1,y); if(x<w-1)push(x+1,y);
      if(y>0)push(x,y-1); if(y<h-1)push(x,y+1);
    }
    ctx.putImageData(id,0,0);
    // crop to the visible garment
    let minX=w,minY=h,maxX=0,maxY=0,found=false;
    for(let y=0;y<h;y++)for(let x=0;x<w;x++){ if(d[(y*w+x)*4+3]>12){found=true; if(x<minX)minX=x; if(x>maxX)maxX=x; if(y<minY)minY=y; if(y>maxY)maxY=y;} }
    let canvas=c;
    if(found){
      const cw=maxX-minX+1, chh=maxY-minY+1;
      const c2=document.createElement('canvas'); c2.width=cw; c2.height=chh;
      c2.getContext('2d').putImageData(ctx.getImageData(minX,minY,cw,chh),0,0);
      canvas=c2;
    }
    cb(canvas.toDataURL('image/webp',0.85));
  };
  img.onerror=()=>cb(dataURL);
  img.src=dataURL;
}

photoInput.onchange=()=>{
  const f=photoInput.files[0]; if(!f) return;
  photoBtn.classList.add('has'); photoBtn.innerHTML='✂️ removing background…';
  const r=new FileReader();
  r.onload=()=>processPhoto(r.result, out=>{
    pendingPhoto=out; photoBtn.innerHTML='<img src="'+out+'">';
  });
  r.readAsDataURL(f);
};
document.querySelectorAll('.addbox .catpick button').forEach(b=>{
  b.onclick=()=>{ document.querySelectorAll('.addbox .catpick button').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); pendingCat=b.dataset.cat; };
});
let pendingSeason=[], pendingOccasion=[];
function setupChips(id, arr){
  document.querySelectorAll('#'+id+' button').forEach(b=>{
    b.onclick=()=>{
      const v=b.dataset.v, i=arr.indexOf(v);
      if(i>=0){ arr.splice(i,1); b.classList.remove('sel'); }
      else { arr.push(v); b.classList.add('sel'); }
    };
  });
}
setupChips('seasonChips', pendingSeason);
setupChips('occasionChips', pendingOccasion);

document.getElementById('saveItem').onclick=async ()=>{
  const name=document.getElementById('itemName').value.trim();
  if(!pendingPhoto){ toast('add a photo first 📸'); return; }
  if(!pendingCat){ toast('top, bottom or one-piece?'); return; }
  if(!name){ toast('give it a name!'); return; }
  const saveBtn=document.getElementById('saveItem');
  const id=uuid();
  let img=pendingPhoto;
  if(online){
    saveBtn.disabled=true; toast('uploading photo… ☁️');
    try{ img=await uploadPhoto(id, pendingPhoto); }
    catch(e){ console.error(e); saveBtn.disabled=false; toast('photo upload failed — is the “wardrobe-photos” bucket made & public?'); return; }
    saveBtn.disabled=false;
  }
  const it={id, name, cat:pendingCat, img, season:pendingSeason.slice(), occasion:pendingOccasion.slice()};
  state.items.push(it); save(); cloudInsertItem(it);
  pendingPhoto=null; pendingCat=null; pendingSeason.length=0; pendingOccasion.length=0;
  document.getElementById('itemName').value='';
  photoBtn.classList.remove('has'); photoBtn.innerHTML='📸 TAP TO ADD PHOTO<br>(camera or gallery)';
  document.querySelectorAll('.catpick button, .chips button').forEach(x=>x.classList.remove('sel'));
  renderStuff(); renderDeck('top'); renderDeck('bot'); renderDeck('dress');
  toast('added to your closet! 💖');
};
function renderStuff(){
  const grid=document.getElementById('stuffGrid');
  grid.innerHTML='';
  if(!state.items.length){ document.getElementById('itemCount').textContent=0; grid.innerHTML='<div style="grid-column:1/3;text-align:center;font-family:var(--pixel);font-size:12px;color:var(--gtext);padding:20px">closet is empty!<br>add your first piece ↑</div>'; return; }
  const shown = state.items.filter(it=>{
    if(filterCat!=='all' && it.cat!==filterCat) return false;
    if(filterSeasonArr.length && !(it.season||[]).some(s=>filterSeasonArr.includes(s))) return false;
    if(filterOccasionArr.length && !(it.occasion||[]).some(o=>filterOccasionArr.includes(o))) return false;
    return true;
  });
  document.getElementById('itemCount').textContent=shown.length;
  if(!shown.length){ grid.innerHTML='<div style="grid-column:1/3;text-align:center;font-family:var(--pixel);font-size:12px;color:var(--gtext);padding:20px">nothing matches these filters!<br>tap a filter again to clear it</div>'; return; }
  shown.forEach(it=>{
    const d=document.createElement('div'); d.className='card';
    const tagTxt = it.cat==='top'?'TOP':(it.cat==='bottom'?'BTM':'1PC');
    const meta=[...(it.season||[]),...(it.occasion||[])].map(m=>'<span>'+m+'</span>').join('');
    d.innerHTML='<span class="tag '+it.cat+'">'+tagTxt+'</span>'+
      '<span class="del" data-id="'+it.id+'">×</span>'+
      '<img src="'+it.img+'"><div class="nm">'+it.name+'</div>'+
      (meta?'<div class="meta">'+meta+'</div>':'');
    d.onclick=()=>openEdit(it.id);
    grid.appendChild(d);
  });
  grid.querySelectorAll('.del').forEach(x=>{
    x.onclick=(e)=>{ e.stopPropagation(); const id=x.dataset.id; state.items=state.items.filter(i=>i.id!==id); save(); cloudDeleteItem(id); renderStuff(); renderDeck('top'); renderDeck('bot'); renderDeck('dress'); toast('removed 👋'); };
  });
}

/* ----- My Closet filters ----- */
let filterCat='all', filterSeasonArr=[], filterOccasionArr=[];
document.querySelectorAll('#filterCat button').forEach(b=>{
  b.onclick=()=>{ document.querySelectorAll('#filterCat button').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); filterCat=b.dataset.v; renderStuff(); };
});
function filterToggle(cid, arr){
  document.querySelectorAll('#'+cid+' button').forEach(b=>{
    b.onclick=()=>{ const v=b.dataset.v, i=arr.indexOf(v); if(i>=0){arr.splice(i,1); b.classList.remove('sel');} else {arr.push(v); b.classList.add('sel');} renderStuff(); };
  });
}
filterToggle('filterSeason', filterSeasonArr);
filterToggle('filterOccasion', filterOccasionArr);

/* =========================================================
   EDIT PIECE MODAL
   ========================================================= */
let editingId=null, editSeasonArr=[], editOccasionArr=[], editCat=null;
setupChips('editSeason', editSeasonArr);
setupChips('editOccasion', editOccasionArr);
document.querySelectorAll('#editCat button').forEach(b=>{
  b.onclick=()=>{ document.querySelectorAll('#editCat button').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); editCat=b.dataset.cat; };
});
function syncChips(cid, arr){ document.querySelectorAll('#'+cid+' button').forEach(b=>b.classList.toggle('sel', arr.includes(b.dataset.v))); }
function openEdit(id){
  const it=state.items.find(i=>i.id===id); if(!it) return;
  editingId=id; editCat=it.cat;
  document.getElementById('editName').value=it.name;
  document.getElementById('editImg').src=it.img;
  document.querySelectorAll('#editCat button').forEach(x=>x.classList.toggle('sel', x.dataset.cat===it.cat));
  editSeasonArr.length=0; (it.season||[]).forEach(s=>editSeasonArr.push(s));
  editOccasionArr.length=0; (it.occasion||[]).forEach(o=>editOccasionArr.push(o));
  syncChips('editSeason', editSeasonArr); syncChips('editOccasion', editOccasionArr);
  document.getElementById('editModal').style.display='flex';
}
document.getElementById('editCancel').onclick=()=>{ document.getElementById('editModal').style.display='none'; editingId=null; };
document.getElementById('editSave').onclick=()=>{
  const it=state.items.find(i=>i.id===editingId);
  if(!it){ document.getElementById('editModal').style.display='none'; return; }
  const nm=document.getElementById('editName').value.trim();
  if(nm) it.name=nm;
  if(editCat) it.cat=editCat;
  it.season=editSeasonArr.slice();
  it.occasion=editOccasionArr.slice();
  save(); cloudUpdateItem(it);
  document.getElementById('editModal').style.display='none'; editingId=null;
  renderStuff(); renderDeck('top'); renderDeck('bot'); renderDeck('dress');
  toast('updated! 💅');
};

/* =========================================================
   CALENDAR
   ========================================================= */
let calDate=new Date();
const MONTHS=['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
const DAYTYPES={
  'Work':  {c:'#6a3fd0', ab:'WORK'},
  'Social':{c:'#d6478f', ab:'SOCIAL'},
  'Travel':{c:'#c98a00', ab:'TRAVEL'},
  'Active':{c:'#6f9e1f', ab:'ACTIVE'}
};
const OCC_MAP={
  'Work':  ['Work','Casual'],
  'Social':['Going out','Formal','Casual'],
  'Travel':['Casual','Active','Holiday'],
  'Active':['Active']
};
function ds(y,m,d){return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');}
function imgById(id){const it=state.items.find(i=>i.id===id); return it?it.img:null;}

function renderCal(){
  const pz=document.getElementById('pendingZone');
  pz.innerHTML = pending ?
    '<div class="pendingbanner">👗 picking a day for your fit — tap one below<span class="x" id="cancelPending">cancel</span></div>' : '';
  if(pending) document.getElementById('cancelPending').onclick=()=>{ pending=null; renderCal(); };

  const dow=document.getElementById('dowRow');
  dow.innerHTML=['S','M','T','W','T','F','S'].map(d=>'<div class="dow">'+d+'</div>').join('');

  // colour legend for day types
  document.getElementById('dayLegend').innerHTML =
    Object.keys(DAYTYPES).map(k=>'<span><i style="background:'+DAYTYPES[k].c+'"></i>'+k+'</span>').join('');

  const y=calDate.getFullYear(), m=calDate.getMonth();
  document.getElementById('monthLabel').textContent=MONTHS[m]+' '+y;
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const today=new Date();
  const grid=document.getElementById('calGrid');
  grid.innerHTML='';
  for(let i=0;i<first;i++){ const b=document.createElement('div'); b.className='day blank'; grid.appendChild(b); }
  for(let d=1;d<=days;d++){
    const key=ds(y,m,d);
    const cell=document.createElement('div'); cell.className='day';
    if(d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear()) cell.classList.add('today');
    let html='<span class="num">'+d+'</span>';
    const dt=state.dayTypes[key];
    if(dt && DAYTYPES[dt]) html+='<div class="daytype" style="background:'+DAYTYPES[dt].c+'">'+DAYTYPES[dt].ab+'</div>';
    const o=state.outfits[key];
    if(o){
      if(o.dressId){ const di=imgById(o.dressId); html+='<div class="mini">'+(di?'<img src="'+di+'">':'')+'</div>'; }
      else { const ti=imgById(o.topId), bi=imgById(o.botId); html+='<div class="mini">'+(ti?'<img src="'+ti+'">':'')+(bi?'<img src="'+bi+'">':'')+'</div>'; }
    }
    cell.innerHTML=html;
    cell.onclick=()=>onDayTap(key);
    grid.appendChild(cell);
  }
}
function onDayTap(key){
  if(pending){
    state.outfits[key]=pending;
    save(); cloudSaveDay(key); pending=null; renderCal(); toast('outfit planned for '+key+' 💅');
  } else {
    openDay(key);
  }
}

/* ----- day planning sheet ----- */
let dayKey=null, daySel=null;
function renderDayChips(){
  const c=document.getElementById('dayTypeChips');
  c.innerHTML=Object.keys(DAYTYPES).map(k=>{
    const on=daySel===k;
    const style=on?'background:'+DAYTYPES[k].c+';border-color:'+DAYTYPES[k].c+';color:#fff':'';
    return '<button data-v="'+k+'" class="'+(on?'sel':'')+'" style="'+style+'">'+k.toUpperCase()+'</button>';
  }).join('');
  c.querySelectorAll('button').forEach(b=>{ b.onclick=()=>{ daySel=(daySel===b.dataset.v?null:b.dataset.v); renderDayChips(); }; });
}
function renderDayOutfit(){
  const el=document.getElementById('dayOutfit');
  const o=state.outfits[dayKey];
  if(!o){
    el.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;gap:10px;"><div class="none">no outfit yet</div><button id="styleMeDay" class="ebtn save" style="padding:10px 18px;">✨ STYLE ME</button></div>';
    document.getElementById('styleMeDay').onclick=openStyle;
    return;
  }
  let imgs='';
  if(o.dressId){ const di=imgById(o.dressId); imgs=di?'<img src="'+di+'">':''; }
  else { const ti=imgById(o.topId), bi=imgById(o.botId); imgs=(ti?'<img src="'+ti+'">':'')+(bi?'<img src="'+bi+'">':''); }
  el.innerHTML=imgs||'<div class="none">those pieces were removed</div>';
}
function openDay(key){
  dayKey=key; daySel=state.dayTypes[key]||null;
  const [yy,mm,dd]=key.split('-').map(Number);
  document.getElementById('dayTitle').textContent='★ '+MONTHS[mm-1].slice(0,3)+' '+dd;
  renderDayChips(); renderDayOutfit();
  document.getElementById('dayModal').style.display='flex';
}
document.getElementById('dayClose').onclick=()=>{
  if(daySel) state.dayTypes[dayKey]=daySel; else delete state.dayTypes[dayKey];
  save(); cloudSaveDay(dayKey); document.getElementById('dayModal').style.display='none'; renderCal();
};
document.getElementById('dayClear').onclick=()=>{
  const k=dayKey; delete state.dayTypes[dayKey]; delete state.outfits[dayKey]; daySel=null;
  save(); cloudDeleteDay(k); document.getElementById('dayModal').style.display='none'; renderCal(); toast('day cleared 🧹');
};

/* ----- day styler: swipe a look filtered by the day's occasion ----- */
let styleOcc=null, styleMode='separates', styleAll=false;
function styleFilter(cat){
  return state.items.filter(it=>{
    if(it.cat!==cat) return false;
    if(styleAll || !styleOcc) return true;
    const allowed = OCC_MAP[styleOcc] || [];
    return (it.occasion||[]).some(o=>allowed.includes(o));
  });
}
DECKS.stop   = {list:()=>styleFilter('top'),    stage:'sTopStage',   name:'sTopName',   count:'sTopCount',   idx:0, label:'tops'};
DECKS.sbot   = {list:()=>styleFilter('bottom'), stage:'sBotStage',   name:'sBotName',   count:'sBotCount',   idx:0, label:'bottoms'};
DECKS.sdress = {list:()=>styleFilter('dress'),  stage:'sDressStage', name:'sDressName', count:'sDressCount', idx:0, label:'one-pieces'};
addSwipe('sTopStage','stop'); addSwipe('sBotStage','sbot'); addSwipe('sDressStage','sdress');

document.querySelectorAll('#styleMode button').forEach(b=>{
  b.onclick=()=>{ styleMode=b.dataset.mode;
    document.querySelectorAll('#styleMode button').forEach(x=>x.classList.toggle('sel', x===b));
    document.getElementById('styleSeparates').style.display = styleMode==='separates'?'block':'none';
    document.getElementById('styleDressWrap').style.display = styleMode==='dress'?'block':'none';
    if(styleMode==='dress') renderDeck('sdress'); else { renderDeck('stop'); renderDeck('sbot'); }
  };
});
function openStyle(){
  styleOcc = daySel || null;
  styleMode='separates'; styleAll=false;
  document.getElementById('styleAllToggle').textContent='👀 SHOW ALL MY CLOTHES';
  DECKS.stop.idx=0; DECKS.sbot.idx=0; DECKS.sdress.idx=0;
  document.querySelectorAll('#styleMode button').forEach(x=>x.classList.toggle('sel', x.dataset.mode==='separates'));
  document.getElementById('styleSeparates').style.display='block';
  document.getElementById('styleDressWrap').style.display='none';
  document.getElementById('styleTitle').textContent = '★ STYLE' + (styleOcc?' · '+styleOcc.toUpperCase():' THIS DAY');
  renderDeck('stop'); renderDeck('sbot'); renderDeck('sdress');
  document.getElementById('styleModal').style.display='flex';
}
document.getElementById('styleAllToggle').onclick=()=>{
  styleAll=!styleAll;
  document.getElementById('styleAllToggle').textContent = styleAll ? '✨ SHOW RECOMMENDED ONLY' : '👀 SHOW ALL MY CLOTHES';
  DECKS.stop.idx=0; DECKS.sbot.idx=0; DECKS.sdress.idx=0;
  if(styleMode==='dress') renderDeck('sdress'); else { renderDeck('stop'); renderDeck('sbot'); }
};
document.getElementById('styleShuffle').onclick=()=>{
  if(styleMode==='dress'){ const d=styleFilter('dress'); if(d.length){ DECKS.sdress.idx=Math.floor(Math.random()*d.length); renderDeck('sdress'); } }
  else { const t=styleFilter('top'), b=styleFilter('bottom'); if(t.length)DECKS.stop.idx=Math.floor(Math.random()*t.length); if(b.length)DECKS.sbot.idx=Math.floor(Math.random()*b.length); renderDeck('stop'); renderDeck('sbot'); }
};
document.getElementById('styleCancel').onclick=()=>{ document.getElementById('styleModal').style.display='none'; };
document.getElementById('styleSave').onclick=()=>{
  let outfit=null;
  if(styleMode==='dress'){ const d=styleFilter('dress'); if(!d.length){ toast('no one-pieces for this occasion 👗'); return; } outfit={dressId:d[DECKS.sdress.idx].id}; }
  else {
    const t=styleFilter('top'), b=styleFilter('bottom');
    if(!t.length||!b.length){ toast('need a top AND bottom for this occasion'); return; }
    outfit={topId:t[DECKS.stop.idx].id, botId:b[DECKS.sbot.idx].id};
  }
  state.outfits[dayKey]=outfit;
  if(daySel) state.dayTypes[dayKey]=daySel;
  save(); cloudSaveDay(dayKey);
  document.getElementById('styleModal').style.display='none';
  renderDayOutfit(); renderCal();
  toast('outfit saved 💅');
};
document.getElementById('prevMonth').onclick=()=>{ calDate.setMonth(calDate.getMonth()-1); renderCal(); };
document.getElementById('nextMonth').onclick=()=>{ calDate.setMonth(calDate.getMonth()+1); renderCal(); };

/* =========================================================
   NAV + TOAST
   ========================================================= */
function switchView(v){
  document.querySelectorAll('.view').forEach(s=>s.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.navtab').forEach(b=>b.classList.toggle('active', b.dataset.view===v));
  if(v==='cal') renderCal();
  if(v==='stuff') renderStuff();
}
document.querySelectorAll('.navtab').forEach(b=> b.onclick=()=>switchView(b.dataset.view));

let toastT;
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200);
}

/* =========================================================
   BOOT — load from Supabase, else fall back to a local demo
   ========================================================= */
function setStatus(){
  const hd=document.querySelector('header'); if(hd) hd.style.position='relative';
  let pill=document.getElementById('syncPill');
  if(!pill){ pill=document.createElement('div'); pill.id='syncPill'; hd.appendChild(pill); }
  pill.textContent = online ? '☁️ synced' : '✈️ local only';
  pill.style.cssText='position:absolute;top:8px;right:10px;font-family:var(--pixel);font-size:9px;line-height:1;padding:4px 7px;border-radius:10px;border:2px solid var(--ink);z-index:5;background:'+(online?'var(--lime)':'var(--butter)')+';color:var(--ink);';
}
async function loadFromCloud(){
  const [itemsRes, plansRes] = await Promise.all([
    db.from('items').select('*').order('created_at',{ascending:true}),
    db.from('day_plans').select('*')
  ]);
  if(itemsRes.error) throw itemsRes.error;
  if(plansRes.error) throw plansRes.error;
  state={items:(itemsRes.data||[]).map(rowToItem), outfits:{}, dayTypes:{}};
  (plansRes.data||[]).forEach(p=>{
    if(p.day_type) state.dayTypes[p.plan_date]=p.day_type;
    if(p.dress_id) state.outfits[p.plan_date]={dressId:p.dress_id};
    else if(p.top_id||p.bottom_id) state.outfits[p.plan_date]={topId:p.top_id, botId:p.bottom_id};
  });
}
async function boot(){
  if(db){
    try{ await loadFromCloud(); online=true; cacheLocal(); }
    catch(e){ console.error('cloud load failed → local demo', e); online=false; state=localOrSeed(); }
  } else { online=false; state=localOrSeed(); }
  if(!state.dayTypes) state.dayTypes={};
  if(!state.outfits)  state.outfits={};
  setStatus();
  renderDeck('top'); renderDeck('bot'); renderDeck('dress');
  renderStuff();
}
boot();
</script>
